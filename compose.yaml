name: lw-ppocr

services:
  http-service:
    platform: "${PPOCR_PLATFORM:-linux/amd64}"
    image: "lw-ppocr-inference:${PPOCR_VERSION:-1.3.0}-opencv"
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PPOCR_VERSION: "${PPOCR_VERSION:-1.3.0}"
        PPOCR_PACKAGE: "${PPOCR_PACKAGE:-lw.PPOCR.Inference-v1.3.0-linux-x64-opencv}"
        PPOCR_SHA256: "${PPOCR_SHA256:-4ed127d541d0f9077a78261513801650ecd9524d69ef377c200898184398a208}"
    ports:
      - "${PPOCR_HTTP_PORT:-8787}:8787"
    environment:
      LW_PPOCR_LISTEN_HOST: "0.0.0.0"
      LW_PPOCR_PORT: "8787"
      LW_PPOCR_API_KEY: "${LW_PPOCR_API_KEY:-}"
      LW_PPOCR_WORKER_THREADS: "${LW_PPOCR_WORKER_THREADS:-4}"
      LW_PPOCR_MAX_REQUEST_BYTES: "${LW_PPOCR_MAX_REQUEST_BYTES:-20971520}"
      LW_PPOCR_MAX_IMAGE_PIXELS: "${LW_PPOCR_MAX_IMAGE_PIXELS:-40000000}"
      # To mount a custom configuration, set this to /config/http-service.json
      # and add: ./http-service.json:/config/http-service.json:ro
      LW_PPOCR_CONFIG_FILE: "${LW_PPOCR_CONFIG_FILE:-/opt/lw-ppocr/http-service.json}"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s

