name: Linux OpenCV DNN

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-20-04:
    name: Ubuntu 20.04 x64 build, test, package
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install build and runtime dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl git \
            libjpeg-dev libpng-dev libtiff-dev pkg-config \
            python3 python3-pip tar zlib1g-dev zstd
          python3 -m pip install --no-cache-dir \
            cmake==3.31.6 ninja==1.11.1.4 jsonschema==4.23.0

      - uses: actions/checkout@v4

      - name: Validate model manifests
        run: python3 scripts/validate-model-schema.py

      - name: Restore minimal OpenCV 5.0 cache
        id: opencv-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/opencv-5.0.0
          key: opencv-5.0.0-ubuntu-20.04-x64-minimal-v1

      - name: Build minimal OpenCV 5.0
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci /tmp/opencv-source /tmp/opencv-build
          curl --fail --location --retry 5 --retry-delay 5 \
            --retry-connrefused \
            https://github.com/opencv/opencv/archive/refs/tags/5.0.0.tar.gz \
            --output /tmp/opencv-5.0.0.tar.gz
          tar -xzf /tmp/opencv-5.0.0.tar.gz \
            --strip-components=1 -C /tmp/opencv-source
          cmake -S /tmp/opencv-source -B /tmp/opencv-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/.ci/opencv-5.0.0" \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DBUILD_LIST=core,imgproc,imgcodecs,dnn \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_JAVA=OFF \
            -DBUILD_opencv_apps=OFF \
            -DBUILD_PERF_TESTS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PROTOBUF=ON \
            -DWITH_EIGEN=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_GDAL=OFF \
            -DWITH_GSTREAMER=OFF \
            -DWITH_GTK=OFF \
            -DWITH_IPP=OFF \
            -DWITH_ITT=OFF \
            -DWITH_JASPER=OFF \
            -DWITH_LAPACK=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_OPENEXR=OFF \
            -DWITH_QT=OFF \
            -DWITH_TBB=OFF \
            -DWITH_WEBP=OFF
          cmake --build /tmp/opencv-build --parallel 2
          cmake --install /tmp/opencv-build

      # Save immediately after OpenCV succeeds. The combined cache action only
      # saves during post-job cleanup, so a later project build/test failure can
      # otherwise force OpenCV to be rebuilt on every retry.
      - name: Save minimal OpenCV 5.0 cache
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/opencv-5.0.0
          key: ${{ steps.opencv-cache.outputs.cache-primary-key }}

      - name: Locate OpenCV package
        run: |
          config="$(find "$GITHUB_WORKSPACE/.ci/opencv-5.0.0" \
            -name OpenCVConfig.cmake -print -quit)"
          test -n "$config"
          echo "OpenCV_DIR=$(dirname "$config")" >> "$GITHUB_ENV"
          echo "OpenCV_LIB=$GITHUB_WORKSPACE/.ci/opencv-5.0.0/lib" >> "$GITHUB_ENV"

      - name: Configure OpenCV DNN Runtime
        run: |
          cmake -S . -B build/ci-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR="$OpenCV_DIR" \
            -DLW_PPOCR_BUILD_OPENCV_RUNTIME=ON \
            -DLW_PPOCR_BUILD_HTTP_SERVICE=ON \
            -DLW_PPOCR_BUILD_TESTS=ON \
            -DLW_PPOCR_BUILD_STUB_RUNTIME=ON \
            -DLW_PPOCR_BUILD_DIRECTML_RUNTIME=OFF \
            -DLW_PPOCR_BUILD_OPENVINO_RUNTIME=OFF \
            -DLW_PPOCR_BUILD_TENSORRT_RUNTIME=OFF \
            -DLW_PPOCR_TEST_DET_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/det.onnx" \
            -DLW_PPOCR_TEST_REC_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/rec.onnx" \
            -DLW_PPOCR_TEST_CLS_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/cls.onnx" \
            -DLW_PPOCR_TEST_DICTIONARY="$GITHUB_WORKSPACE/models/ppocrv6-tiny/ppocr_keys.txt" \
            -DLW_PPOCR_TEST_IMAGE="$GITHUB_WORKSPACE/models/ppocrv6-tiny/sample.jpg"

      - name: Build Release
        run: cmake --build build/ci-linux --parallel

      - name: ABI and OpenCV correctness tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux/bin:${{ env.OpenCV_LIB }}
        run: ctest --test-dir build/ci-linux --output-on-failure --verbose

      - name: HTTP service smoke test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux/bin:${{ env.OpenCV_LIB }}
        run: >-
          python3 scripts/http-service-smoke.py
          --binary-dir build/ci-linux/bin

      - name: Package Linux x64 distribution
        run: >-
          bash scripts/package-linux-x64.sh
          build/ci-linux dist/releases/v1.2.0 1.2.0

      - name: Verify packaged HTTP service
        run: >-
          python3 scripts/http-service-smoke.py
          --package-dir
          dist/releases/v1.2.0/staging-linux-x64/lw.PPOCR.Inference-v1.2.0-linux-x64-opencv

      - name: Inspect ELF dependencies
        run: |
          PACKAGE=dist/releases/v1.2.0/staging-linux-x64/lw.PPOCR.Inference-v1.2.0-linux-x64-opencv
          ldd "$PACKAGE/liblw.PPOCR.so.1"
          ldd "$PACKAGE/runtimes/linux-x64/opencv/liblw.PPOCR.Runtime.OpenCVDNN.so"
          ldd "$PACKAGE/lw-ppocr-http-service"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: lw.PPOCR.Inference-v1.2.0-linux-x64-opencv
          path: |
            dist/releases/v1.2.0/lw.PPOCR.Inference-v1.2.0-linux-x64-opencv.tar.gz
            dist/releases/v1.2.0/lw.PPOCR.Inference-v1.2.0-linux-x64-opencv.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
