name: Linux OpenVINO

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENVINO_RELEASE: 2025.2
  OPENVINO_VERSION: 2025.2.0
  OPENVINO_BUILD: 19140.c01cd93e24d
  OPENVINO_SHA256: 26d44f1a0659ef1859cf116d0eb7c5e989db2fa60e75679ccce0bd7faf2028a6
  PACKAGE_VERSION: 1.3.0

jobs:
  ubuntu-20-04:
    name: Ubuntu 20.04 x64 CPU build, test, package
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install build and runtime dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl git \
            libjpeg-dev libnuma1 libpng-dev libtiff-dev pkg-config \
            python3 python3-pip tar zlib1g-dev zstd
          python3 -m pip install --no-cache-dir \
            cmake==3.31.6 ninja==1.11.1.4 jsonschema==4.23.0

      - uses: actions/checkout@v4

      - name: Validate model manifests
        run: python3 scripts/validate-model-schema.py

      - name: Restore minimal OpenCV 5.0 cache
        id: opencv-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/opencv-5.0.0
          key: opencv-5.0.0-ubuntu-20.04-x64-minimal-v1

      - name: Build minimal OpenCV 5.0
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci /tmp/opencv-source /tmp/opencv-build
          curl --fail --location --retry 5 --retry-delay 5 \
            --retry-connrefused \
            https://github.com/opencv/opencv/archive/refs/tags/5.0.0.tar.gz \
            --output /tmp/opencv-5.0.0.tar.gz
          tar -xzf /tmp/opencv-5.0.0.tar.gz \
            --strip-components=1 -C /tmp/opencv-source
          cmake -S /tmp/opencv-source -B /tmp/opencv-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/.ci/opencv-5.0.0" \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DBUILD_LIST=core,imgproc,imgcodecs,dnn \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_JAVA=OFF \
            -DBUILD_opencv_apps=OFF \
            -DBUILD_PERF_TESTS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PROTOBUF=ON \
            -DWITH_EIGEN=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_GDAL=OFF \
            -DWITH_GSTREAMER=OFF \
            -DWITH_GTK=OFF \
            -DWITH_IPP=OFF \
            -DWITH_ITT=OFF \
            -DWITH_JASPER=OFF \
            -DWITH_LAPACK=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_OPENEXR=OFF \
            -DWITH_QT=OFF \
            -DWITH_TBB=OFF \
            -DWITH_WEBP=OFF
          cmake --build /tmp/opencv-build --parallel 2
          cmake --install /tmp/opencv-build

      - name: Save minimal OpenCV 5.0 cache
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/opencv-5.0.0
          key: ${{ steps.opencv-cache.outputs.cache-primary-key }}

      - name: Restore OpenVINO archive cache
        id: openvino-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci/openvino-${{ env.OPENVINO_VERSION }}-ubuntu20-x64
          key: openvino-${{ env.OPENVINO_VERSION }}-${{ env.OPENVINO_BUILD }}-ubuntu20-x64-v1

      - name: Download official OpenVINO Ubuntu 20.04 package
        if: steps.openvino-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ".ci/openvino-${OPENVINO_VERSION}-ubuntu20-x64"
          curl --fail --location --retry 5 --retry-delay 5 \
            --retry-connrefused \
            "https://storage.openvinotoolkit.org/repositories/openvino/packages/${OPENVINO_RELEASE}/linux/openvino_toolkit_ubuntu20_${OPENVINO_VERSION}.${OPENVINO_BUILD}_x86_64.tgz" \
            --output "/tmp/openvino-${OPENVINO_VERSION}.tgz"
          echo "${OPENVINO_SHA256}  /tmp/openvino-${OPENVINO_VERSION}.tgz" \
            | sha256sum -c -
          tar -xzf "/tmp/openvino-${OPENVINO_VERSION}.tgz" \
            --strip-components=1 \
            -C ".ci/openvino-${OPENVINO_VERSION}-ubuntu20-x64"

      - name: Save OpenVINO archive cache
        if: steps.openvino-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci/openvino-${{ env.OPENVINO_VERSION }}-ubuntu20-x64
          key: ${{ steps.openvino-cache.outputs.cache-primary-key }}

      - name: Locate native packages
        run: |
          config="$(find "$GITHUB_WORKSPACE/.ci/opencv-5.0.0" \
            -name OpenCVConfig.cmake -print -quit)"
          test -n "$config"
          echo "OpenCV_DIR=$(dirname "$config")" >> "$GITHUB_ENV"
          echo "OpenCV_LIB=$GITHUB_WORKSPACE/.ci/opencv-5.0.0/lib" >> "$GITHUB_ENV"
          echo "OPENVINO_ROOT=$GITHUB_WORKSPACE/.ci/openvino-${OPENVINO_VERSION}-ubuntu20-x64" >> "$GITHUB_ENV"
          test -e ".ci/openvino-${OPENVINO_VERSION}-ubuntu20-x64/runtime/cmake/OpenVINOConfig.cmake"
          test -e ".ci/openvino-${OPENVINO_VERSION}-ubuntu20-x64/runtime/lib/intel64/libopenvino.so"

      - name: Configure OpenVINO CPU Runtime
        run: |
          cmake -S . -B build/ci-linux-openvino -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR="$OpenCV_DIR" \
            -DLW_PPOCR_OPENVINO_ROOT="$OPENVINO_ROOT" \
            -DLW_PPOCR_BUILD_OPENVINO_RUNTIME=ON \
            -DLW_PPOCR_BUILD_HTTP_SERVICE=ON \
            -DLW_PPOCR_BUILD_TESTS=ON \
            -DLW_PPOCR_BUILD_STUB_RUNTIME=ON \
            -DLW_PPOCR_BUILD_OPENCV_RUNTIME=OFF \
            -DLW_PPOCR_BUILD_DIRECTML_RUNTIME=OFF \
            -DLW_PPOCR_BUILD_ONNXRUNTIME_RUNTIME=OFF \
            -DLW_PPOCR_BUILD_TENSORRT_RUNTIME=OFF \
            -DLW_PPOCR_TEST_DET_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/det.onnx" \
            -DLW_PPOCR_TEST_REC_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/rec.onnx" \
            -DLW_PPOCR_TEST_CLS_MODEL="$GITHUB_WORKSPACE/models/ppocrv6-tiny/cls.onnx" \
            -DLW_PPOCR_TEST_DICTIONARY="$GITHUB_WORKSPACE/models/ppocrv6-tiny/ppocr_keys.txt" \
            -DLW_PPOCR_TEST_IMAGE="$GITHUB_WORKSPACE/models/ppocrv6-tiny/sample.jpg" \
            -DLW_PPOCR_TEST_OPENVINO_DEVICE=CPU

      - name: Build Release
        run: cmake --build build/ci-linux-openvino --parallel

      - name: ABI and OpenVINO correctness tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux-openvino/bin:${{ env.OPENVINO_ROOT }}/runtime/lib/intel64:${{ env.OPENVINO_ROOT }}/runtime/3rdparty/tbb/lib:${{ env.OpenCV_LIB }}
        run: ctest --test-dir build/ci-linux-openvino --output-on-failure --verbose

      - name: HTTP service host smoke test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/ci-linux-openvino/bin:${{ env.OPENVINO_ROOT }}/runtime/lib/intel64:${{ env.OPENVINO_ROOT }}/runtime/3rdparty/tbb/lib:${{ env.OpenCV_LIB }}
        run: >-
          python3 scripts/http-service-smoke.py
          --binary-dir build/ci-linux-openvino/bin

      - name: Package Linux x64 OpenVINO CPU distribution
        run: >-
          bash scripts/package-linux-openvino-x64.sh
          build/ci-linux-openvino
          "dist/releases/v${PACKAGE_VERSION}"
          "${PACKAGE_VERSION}"

      - name: Verify packaged HTTP service
        run: >-
          python3 scripts/http-service-smoke.py
          --package-dir
          "dist/releases/v${PACKAGE_VERSION}/staging-linux-openvino-x64/lw.PPOCR.Inference-v${PACKAGE_VERSION}-linux-x64-openvino-cpu"

      - name: Inspect ELF dependencies
        run: |
          PACKAGE="dist/releases/v${PACKAGE_VERSION}/staging-linux-openvino-x64/lw.PPOCR.Inference-v${PACKAGE_VERSION}-linux-x64-openvino-cpu"
          ldd "$PACKAGE/liblw.PPOCR.so.1"
          ldd "$PACKAGE/runtimes/linux-x64/openvino/liblw.PPOCR.Runtime.OpenVINO.so"
          ldd "$PACKAGE/lw-ppocr-http-service"

      - name: Upload Linux OpenVINO CPU package
        uses: actions/upload-artifact@v4
        with:
          name: lw.PPOCR.Inference-v${{ env.PACKAGE_VERSION }}-linux-x64-openvino-cpu
          path: |
            dist/releases/v${{ env.PACKAGE_VERSION }}/lw.PPOCR.Inference-v${{ env.PACKAGE_VERSION }}-linux-x64-openvino-cpu.tar.gz
            dist/releases/v${{ env.PACKAGE_VERSION }}/lw.PPOCR.Inference-v${{ env.PACKAGE_VERSION }}-linux-x64-openvino-cpu.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
