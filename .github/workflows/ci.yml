name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # VS preset build + ABI smoke + ABI stability
  # ------------------------------------------------------------------
  build-and-smoke:
    name: Build & ABI smoke (VS 2022)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure (VS preset)
        run: cmake --preset vs2022-x64

      - name: Build Release
        run: cmake --build --preset vs2022-x64-release

      - name: ABI smoke test
        run: ctest --preset vs2022-x64-release -R lw.ppocr.abi.smoke --output-on-failure

      - name: ABI stability test
        run: ctest --preset vs2022-x64-release -R lw.ppocr.abi.stability --output-on-failure

  # ------------------------------------------------------------------
  # OpenCV DNN integration + golden correctness test
  # ------------------------------------------------------------------
  opencv-integration:
    name: OpenCV DNN integration & golden
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Cache OpenCV
        id: opencv-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/opencv
          key: opencv-5.0.0-windows-x64-v3

      - name: Download OpenCV
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://downloads.sourceforge.net/project/opencvlibrary/5.0.0/opencv-5.0.0-windows.exe"
          $installer = Join-Path $env:RUNNER_TEMP "opencv-5.0.0-windows.exe"

          Write-Host "Downloading OpenCV 5.0.0 from: $url"
          curl.exe `
            -L --fail --show-error `
            --retry 5 --retry-delay 10 --retry-all-errors `
            --output "$installer" `
            "$url"
          if ($LASTEXITCODE -ne 0) { throw "curl exit code: $LASTEXITCODE" }

          if (-not (Test-Path $installer)) { throw "Installer not found" }
          $size = (Get-Item $installer).Length
          if ($size -lt 150MB) { throw "File too small ($size bytes), may be HTML page" }

          # verify MZ header
          $stream = [System.IO.File]::OpenRead($installer)
          try { $b0 = $stream.ReadByte(); $b1 = $stream.ReadByte() }
          finally { $stream.Dispose() }
          if ($b0 -ne 0x4D -or $b1 -ne 0x5A) { throw "Not a valid executable" }
          Write-Host "OpenCV download OK: $size bytes"

      - name: Extract OpenCV
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Join-Path $env:RUNNER_TEMP "opencv-5.0.0-windows.exe"
          $dest = Join-Path $env:RUNNER_TEMP "opencv"
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          $sevenZip = Get-Command "7z.exe" -ErrorAction Stop
          Write-Host "7-Zip: $($sevenZip.Source)"
          & $sevenZip.Source x "$installer" "-o$dest" -y
          if ($LASTEXITCODE -ne 0) { throw "7z exit code: $LASTEXITCODE" }
          Write-Host "OpenCV extracted to $dest"

      - name: Set OpenCV paths
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $extractRoot = Join-Path $env:RUNNER_TEMP "opencv"

          $config = Get-ChildItem -Path $extractRoot `
            -Filter "OpenCVConfig.cmake" -File -Recurse |
            Select-Object -First 1
          if (-not $config) {
            Write-Host "Extracted tree:"
            Get-ChildItem -Path $extractRoot -Recurse -Depth 3 |
              ForEach-Object { Write-Host $_.FullName }
            throw "OpenCVConfig.cmake not found"
          }

          # OpenCVConfig.cmake lives at <root>/build/OpenCVConfig.cmake
          $opencvBuild = Split-Path -Parent $config.FullName
          $opencvRoot  = Split-Path -Parent $opencvBuild

          $opencvDll = Get-ChildItem -Path $opencvBuild `
            -Filter "opencv_world*.dll" -File -Recurse |
            Where-Object { $_.FullName -notmatch "\\debug\\" } |
            Select-Object -First 1
          if (-not $opencvDll) { throw "opencv_world DLL not found" }
          $opencvBin = Split-Path -Parent $opencvDll.FullName

          "OpenCV_ROOT=$opencvRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OpenCV_BIN=$opencvBin"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "OpenCV_ROOT=$opencvRoot"
          Write-Host "OpenCV_BIN=$opencvBin"

      - name: Configure with OpenCV Runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S . -B build/ci-opencv `
            -G "Visual Studio 17 2022" -A x64 `
            -DLW_PPOCR_BUILD_OPENCV_RUNTIME=ON `
            -DLW_PPOCR_OPENCV_ROOT="$env:OpenCV_ROOT" `
            -DLW_PPOCR_BUILD_DIRECTML_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_OPENVINO_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_TENSORRT_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_TESTS=ON `
            -DLW_PPOCR_BUILD_STUB_RUNTIME=ON `
            -DLW_PPOCR_TEST_DET_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/det.onnx" `
            -DLW_PPOCR_TEST_REC_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/rec.onnx" `
            -DLW_PPOCR_TEST_CLS_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/cls.onnx" `
            -DLW_PPOCR_TEST_DICTIONARY="${{ github.workspace }}/models/ppocrv6-tiny/ppocr_keys.txt" `
            -DLW_PPOCR_TEST_IMAGE="${{ github.workspace }}/models/ppocrv6-tiny/sample.jpg"
          if ($LASTEXITCODE -ne 0) { throw "CMake configure exit code: $LASTEXITCODE" }

      - name: Build Release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --build build/ci-opencv --config Release --parallel `
            -- /verbosity:normal 2>&1 |
            Tee-Object -FilePath build-release.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "========== Build log =========="
            Get-Content build-release.log
            throw "Build exit code: $LASTEXITCODE"
          }

      - name: OpenCV integration test
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\build\ci-opencv\bin\Release;$env:OpenCV_BIN;$env:PATH"
          ctest --test-dir build/ci-opencv -C Release `
            -R "^lw\.ppocr\.opencv\.integration$" --output-on-failure --verbose
          if ($LASTEXITCODE -ne 0) { throw "Integration test exit code: $LASTEXITCODE" }

      - name: Golden correctness test
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\build\ci-opencv\bin\Release;$env:OpenCV_BIN;$env:PATH"
          ctest --test-dir build/ci-opencv -C Release `
            -R "^lw\.ppocr\.golden$" --output-on-failure --verbose
          if ($LASTEXITCODE -ne 0) { throw "Golden test exit code: $LASTEXITCODE" }

  # ------------------------------------------------------------------
  # C example compilation test
  # ------------------------------------------------------------------
  c-example:
    name: C example build
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build C example
        working-directory: examples/c
        run: cl /utf-8 /W4 /Fe:ppocr_example.exe main.c
