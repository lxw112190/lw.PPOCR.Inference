name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # VS preset build + ABI smoke + ABI stability
  # ------------------------------------------------------------------
  build-and-smoke:
    name: Build & ABI smoke (VS 2022)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure (VS preset)
        run: cmake --preset vs2022-x64

      - name: Build Release
        run: cmake --build --preset vs2022-x64-release

      - name: ABI smoke test
        run: ctest --preset vs2022-x64-release -R lw.ppocr.abi.smoke --output-on-failure

      - name: ABI stability test
        run: ctest --preset vs2022-x64-release -R lw.ppocr.abi.stability --output-on-failure

  # ------------------------------------------------------------------
  # OpenCV DNN integration + golden correctness test
  # ------------------------------------------------------------------
  opencv-integration:
    name: OpenCV DNN integration & golden
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Cache OpenCV
        id: opencv-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/opencv
          key: opencv-5.0.0-windows-x64

      - name: Download and extract OpenCV
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/opencv/opencv/releases/download/5.0.0/opencv-5.0.0-windows.exe"
          $installer = "${{ runner.temp }}\opencv-installer.exe"
          Write-Host "Downloading OpenCV 5.0.0..."
          Invoke-WebRequest -Uri $url -OutFile $installer -MaximumRetryCount 3 -RetryIntervalSec 10
          Write-Host "Extracting..."
          Start-Process -FilePath $installer -ArgumentList @("-o${{ runner.temp }}\opencv", "-y") -Wait -NoNewWindow
          Write-Host "OpenCV extracted to ${{ runner.temp }}\opencv"

      - name: Set OpenCV paths
        run: |
          $root = "${{ runner.temp }}\opencv\opencv\build"
          if (-not (Test-Path "$root\OpenCVConfig.cmake")) {
            # fallback: search one level deeper
            $found = Get-ChildItem -Path "${{ runner.temp }}\opencv" -Filter "OpenCVConfig.cmake" -Recurse -Depth 3 |
              Select-Object -First 1
            if ($found) { $root = Split-Path -Parent $found.FullName }
          }
          echo "OpenCV_ROOT=$root" >> $env:GITHUB_ENV
          echo "OpenCV_BIN=$root\x64\vc17\bin" >> $env:GITHUB_ENV
          Write-Host "OpenCV_ROOT=$root"

      - name: Configure with OpenCV Runtime
        run: |
          cmake -S . -B build/ci-opencv -G "Visual Studio 17 2022" -A x64 `
            -DLW_PPOCR_BUILD_OPENCV_RUNTIME=ON `
            -DLW_PPOCR_OPENCV_ROOT="$env:OpenCV_ROOT" `
            -DLW_PPOCR_BUILD_DIRECTML_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_OPENVINO_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_TENSORRT_RUNTIME=OFF `
            -DLW_PPOCR_BUILD_TESTS=ON `
            -DLW_PPOCR_BUILD_STUB_RUNTIME=ON `
            -DLW_PPOCR_TEST_DET_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/det.onnx" `
            -DLW_PPOCR_TEST_REC_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/rec.onnx" `
            -DLW_PPOCR_TEST_CLS_MODEL="${{ github.workspace }}/models/ppocrv6-tiny/cls.onnx" `
            -DLW_PPOCR_TEST_DICTIONARY="${{ github.workspace }}/models/ppocrv6-tiny/ppocr_keys.txt" `
            -DLW_PPOCR_TEST_IMAGE="${{ github.workspace }}/models/ppocrv6-tiny/sample.jpg"

      - name: Build Release
        run: cmake --build build/ci-opencv --config Release

      - name: OpenCV integration test
        run: |
          $env:PATH = "${{ github.workspace }}\build\ci-opencv\bin\Release;$env:OpenCV_BIN;$env:PATH"
          ctest --test-dir build/ci-opencv -C Release `
            -R lw.ppocr.opencv.integration --output-on-failure

      - name: Golden correctness test
        run: |
          $env:PATH = "${{ github.workspace }}\build\ci-opencv\bin\Release;$env:OpenCV_BIN;$env:PATH"
          ctest --test-dir build/ci-opencv -C Release `
            -R lw.ppocr.golden --output-on-failure

  # ------------------------------------------------------------------
  # C example compilation test
  # ------------------------------------------------------------------
  c-example:
    name: C example build
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build C example
        working-directory: examples/c
        run: cl /utf-8 /W4 /Fe:ppocr_example.exe main.c
